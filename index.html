<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sixty Degrees</title>

<style>
:root{
  --black:#000000;
  --red:#e10600;
  --dark:#0f0f0f;
  --light:#ffffff;
  --border:rgba(255,255,255,.10);
}

*{box-sizing:border-box}

html,body{height:100%}

body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(225,6,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(225,6,0,0.15), transparent 50%),
    linear-gradient(180deg, #000000 0%, #0a0a0a 100%);
  color:var(--light);
  overflow:hidden;
}

.app{
  height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:12px;
  padding:14px;
  max-width:720px;
  margin:0 auto;
}

/* TOP BAR */
.side{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--dark);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
}

.logo{width:90px}

.chips{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  width:60%;
}

.chip{
  background:#111;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  font-size:12px;
  cursor:pointer;
  transition:.2s;
  text-align:center;
}
.chip:hover{border-color:var(--red);color:var(--red)}

/* CHAT */
.chat{
  display:flex;
  flex-direction:column;
  background:var(--dark);
  border-radius:16px;
  border:1px solid var(--border);
  overflow:hidden;
}

.chat-header{
  padding:14px;
  border-bottom:1px solid var(--border);
  font-weight:bold;
}

.messages{
  flex:1;
  overflow:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{max-width:75%}
.msg.user{align-self:flex-end;text-align:right}

.bubble{
  padding:12px 14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.35;
}

.user .bubble{background:var(--red)}
.bot .bubble{background:#171717;border:1px solid var(--border)}

.composer{
  display:flex;
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:16px;
  background:#0b0b0b;
  border:none;
  color:white;
  font-size:16px; /* important for mobile no-zoom */
}
input:focus{outline:none}

button{
  background:var(--red);
  border:none;
  color:white;
  padding:0 18px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">
  <aside class="side">
    <img src="ete.jpg" class="logo" alt="Sixty Degrees">
    <div class="chips" id="chips"></div>
  </aside>

  <main class="chat">
    <div class="chat-header">Sixty Degrees</div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <input id="input" placeholder="What is Sixty Degrees?" />
      <button onclick="send()">Send</button>
    </div>
  </main>
</div>

<script>
/**
 * Keep only the 4 suggestions you already have
 */
const SUGGESTED = [
  "What is Sixty Degrees?",
  "Pricing",
  "Integrations",
  "Book a demo"
];

/**
 * "Knowledge base" style responses.
 * Note: For CEO/owner/headcount, it's safer to answer in a non-specific way
 * unless you hardcode the real info (so we avoid wrong facts).
 */
const ANSWERS = [
  {
    keys: ["what is sixty degrees", "what is sixty", "about sixty degrees", "company", "who are you"],
    reply:
      "Sixty Degrees is a technology-driven company focused on building smart digital experiences and seamless digital engagement solutions—helping organizations improve the way they connect with customers and teams."
  },
  {
    keys: ["pricing", "price", "cost", "how much"],
    reply:
      "Pricing depends on the scope (features, integrations, rollout size, and support). If you share your use case and number of users, we can propose the best-fit package."
  },
  {
    keys: ["integrations", "integrate", "api", "hubspot", "salesforce", "crm"],
    reply:
      "We integrate via API and can connect with platforms like HubSpot, Salesforce, and other enterprise systems. We typically map data flows, set permissions, and then deploy in phases."
  },
  {
    keys: ["demo", "book a demo", "book demo", "schedule", "meeting"],
    reply:
      "Happy to set up a demo. Tell us your company, what you want to achieve, and your preferred dates—and we’ll propose a slot."
  },

  // NEW: Location
  {
    keys: ["where are you located", "location", "where are you based", "based", "office", "headquarters", "hq"],
    reply:
      "We work internationally. If you’re looking for our main office location, share your region and we’ll point you to the most relevant local contact or hub."
  },

  // NEW: Headcount / team size
  {
    keys: ["how many people", "headcount", "team size", "employees", "how big is the team", "staff"],
    reply:
      "Team size varies by market and partners. If you tell us what you’re evaluating (pilot vs. full deployment), we can share the typical team composition involved (product, engineering, delivery, support)."
  },

  // NEW: Success cases / case studies
  {
    keys: ["success", "success stories", "case studies", "examples", "use cases", "results", "clients", "references"],
    reply:
      "We typically see the strongest impact in projects like: (1) customer experience and digital engagement, (2) operational efficiency through automation and integrations, and (3) analytics/visibility across teams. If you tell me your industry (airport, retail, hospitality, etc.), I can list the most relevant success-case examples we usually showcase."
  },

  // NEW: CEO / owner
  {
    keys: ["ceo", "owner", "founder", "who owns", "who is the ceo", "leadership", "management team"],
    reply:
      "For the most accurate leadership information (CEO/founders/ownership), please check the official company website or LinkedIn page—or share the link here and I’ll help you summarize it."
  },

  // More “sensible” info to have
  {
    keys: ["what do you do", "services", "solutions", "offer", "product"],
    reply:
      "We help companies design and deliver digital experiences: discovery & strategy, UX/UI, platform development, integrations (CRM/ERP), analytics, and ongoing optimization—always tailored to the customer journey and operational reality."
  },
  {
    keys: ["industries", "sectors", "verticals"],
    reply:
      "We’re a fit for organizations that need strong digital engagement and integration—common sectors include retail, mobility/transport, hospitality, and enterprise services. Tell me your sector and goal and I’ll suggest the best starting point."
  },
  {
    keys: ["implementation", "rollout", "deployment", "how long", "timeline"],
    reply:
      "A typical rollout starts with discovery, then a pilot, then phased expansion. Timelines depend on integrations and scope, but we usually recommend moving fast with a small pilot and scaling based on results."
  },
  {
    keys: ["security", "privacy", "gdpr", "compliance"],
    reply:
      "Security and privacy are built in: role-based access, auditability, and GDPR-aligned practices. For formal requirements, we can provide documentation and align with your IT/security team."
  },
  {
    keys: ["support", "maintenance", "sla"],
    reply:
      "We can provide ongoing support and maintenance, including SLAs depending on your needs. If you tell us your required coverage (business hours vs. 24/7), we’ll propose the right support model."
  }
];

const FALLBACK =
  "At the moment we are unable to answer that question. Please try asking about pricing, integrations, booking a demo, location, team size, or success cases.";

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const chipsContainer = document.getElementById("chips");

function addMessage(role,text){
  const msg=document.createElement("div");
  msg.className="msg "+role;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  msg.appendChild(bubble);
  messages.appendChild(msg);
  messages.scrollTop=messages.scrollHeight;
}

function getResponse(text){
  const lower = text.toLowerCase().trim();

  for(const item of ANSWERS){
    for(const k of item.keys){
      // includes match for flexible phrasing
      if(lower.includes(k)) return item.reply;
    }
  }

  // quick heuristics (handles "book demo" vs "demo", etc.)
  if(lower.includes("book") && lower.includes("demo")) {
    return ANSWERS.find(a => a.keys.includes("demo")).reply;
  }

  return FALLBACK;
}

function send(){
  const text=input.value.trim();
  if(!text) return;
  addMessage("user",text);
  input.value="";
  setTimeout(()=>addMessage("bot",getResponse(text)),300);
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

SUGGESTED.forEach(q=>{
  const chip=document.createElement("div");
  chip.className="chip";
  chip.textContent=q;
  chip.onclick=()=>{input.value=q;input.focus();}
  chipsContainer.appendChild(chip);
});

addMessage("bot","Hello. How can we help you?");
</script>

</body>
</html>
