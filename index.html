<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sixty Degrees</title>

<style>
:root{
  --black:#000000;
  --red:#e10600;
  --dark:#0f0f0f;
  --light:#ffffff;
  --border:rgba(255,255,255,.10);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:var(--black);
  color:var(--light);
  overflow:hidden;
}

.app{
  height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:12px;
  padding:14px;
  max-width:720px;
  margin:0 auto;
}

/* TOP BAR */
.side{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--dark);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
}

.logo{width:90px}

.chips{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  width:60%;
}

.chip{
  background:#111;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  font-size:12px;
  cursor:pointer;
  transition:.2s;
  text-align:center;
}

.chip:hover{
  border-color:var(--red);
  color:var(--red);
}

/* CHAT */
.chat{
  display:flex;
  flex-direction:column;
  background:var(--dark);
  border-radius:16px;
  border:1px solid var(--border);
  overflow:hidden;
}

.chat-header{
  padding:14px;
  border-bottom:1px solid var(--border);
  font-weight:bold;
}

.messages{
  flex:1;
  overflow:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{max-width:75%}
.msg.user{align-self:flex-end;text-align:right}

.bubble{
  padding:12px 14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.35;
}

.user .bubble{
  background:var(--red);
}

.bot .bubble{
  background:#171717;
  border:1px solid var(--border);
}

.composer{
  display:flex;
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:16px;
  background:#0b0b0b;
  border:none;
  color:white;
  font-size:16px; /* prevents mobile zoom */
}

input:focus{outline:none}

button{
  background:var(--red);
  border:none;
  color:white;
  padding:0 18px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

  <aside class="side">
    <img src="ete.jpg" class="logo" alt="Sixty Degrees">
    <div class="chips" id="chips"></div>
  </aside>

  <main class="chat">
    <div class="chat-header">Sixty Degrees</div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <input id="input" placeholder="What is Sixty Degrees?" />
      <button onclick="send()">Send</button>
    </div>
  </main>

</div>

<script>
const SUGGESTED = [
  "What is Sixty Degrees?",
  "Pricing information",
  "Integrations",
  "Book a demo"
];

const ANSWERS = [
  {
    keys:["what is sixty degrees","about","company"],
    reply:"Sixty Degrees is a technology-driven company focused on delivering smart digital experiences and seamless digital engagement solutions."
  },
  {
    keys:["pricing","price","cost"],
    reply:"Pricing depends on your project scope and number of users. Contact us for a tailored proposal."
  },
  {
    keys:["integrations","api","hubspot","salesforce","crm"],
    reply:"We integrate via API and can connect with platforms like HubSpot, Salesforce, and other enterprise systems."
  },
  {
    keys:["demo","book","meeting"],
    reply:"You can book a personalized demo by sharing your company details and preferred date."
  },
  {
    keys:["location","where","based","office","hq"],
    reply:"We operate internationally. Let us know your region and we’ll connect you with the most relevant office."
  },
  {
    keys:["how many","team","employees","staff"],
    reply:"Our team size varies depending on projects and markets. We combine product, engineering and delivery experts for each engagement."
  },
  {
    keys:["success","case","examples","clients","results"],
    reply:"We focus on digital engagement, automation, integrations and analytics. Tell us your industry and we’ll share relevant success examples."
  },
  {
    keys:["ceo","owner","founder","leadership"],
    reply:"For the latest leadership information, please refer to the official company website or LinkedIn page."
  }
];

const FALLBACK =
  "At the moment we are unable to answer that question. Please try asking about pricing, integrations, demo, location or success cases.";

const messages=document.getElementById("messages");
const input=document.getElementById("input");
const chipsContainer=document.getElementById("chips");

function addMessage(role,text){
  const msg=document.createElement("div");
  msg.className="msg "+role;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  msg.appendChild(bubble);
  messages.appendChild(msg);
  messages.scrollTop=messages.scrollHeight;
}

function getResponse(text){
  const lower=text.toLowerCase();
  for(const item of ANSWERS){
    for(const key of item.keys){
      if(lower.includes(key)) return item.reply;
    }
  }
  return FALLBACK;
}

function send(){
  const text=input.value.trim();
  if(!text) return;
  addMessage("user",text);
  input.value="";
  setTimeout(()=>addMessage("bot",getResponse(text)),300);
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

SUGGESTED.forEach(q=>{
  const chip=document.createElement("div");
  chip.className="chip";
  chip.textContent=q;
  chip.onclick=()=>{input.value=q;input.focus();}
  chipsContainer.appendChild(chip);
});

addMessage("bot","Hello. How can we help you?");
</script>

</body>
</html>
